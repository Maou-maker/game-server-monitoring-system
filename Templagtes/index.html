<h1>Game Server Monitoring</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Server</th>
        <th>Game</th>
        <th>IP</th>
        <th>Status</th>
    </tr>

    {% for s in servers %}
    <tr>
        <td>{{ s['id_server'] }}</td>
        <td>{{ s['nama_server'] }}</td>
        <td>{{ s['nama_game'] }}</td>
        <td>{{ s['ip_address'] }}</td>
        <td>{{ s['status'] }}</td>
    </tr>
    {% endfor %}
</table>
